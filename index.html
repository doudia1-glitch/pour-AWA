<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour Awa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style> body { font-family: 'Playfair Display', serif; } </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">
    <div id="content" class="text-center p-6">
        <h1 class="text-7xl md:text-9xl font-light tracking-widest animate-pulse mb-8">AWA</h1>
        <button onclick="reveal()" class="px-8 py-3 border border-pink-500 text-pink-500 hover:bg-pink-500 hover:text-white transition-all duration-500 rounded-full uppercase tracking-widest text-sm">
            Ouvrir mon cœur
        </button>
    </div>

    <script>
        function reveal() {
            document.getElementById('content').innerHTML = `
                <div class="max-w-md mx-auto bg-white/5 backdrop-blur-lg p-8 rounded-2xl border border-white/10 shadow-2xl transition-all duration-1000 scale-110">
                    <div class="text-pink-500 text-4xl mb-6">♥</div>
                    <h2 class="text-2xl text-pink-400 mb-6 italic text-left">Pour l'unique...</h2>
                    <p class="text-lg leading-relaxed text-gray-200 text-left mb-4">
                        Awa, j'ai codé cet espace juste pour toi. Un endroit qui n'appartient qu'à nous.
                    </p>
                    <p class="text-lg leading-relaxed text-gray-200 text-left italic font-serif">
                        "Dans le silence de mes codes, ton nom est la plus belle des variables."
                    </p>
                    <div class="mt-8 pt-6 border-t border-white/10 text-sm text-gray-500">À jamais.</div>
                </div>
            `;
        }
    </script>
</body>
</html>
